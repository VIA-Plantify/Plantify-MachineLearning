name: dev
services:
  maldev-gpu:
    build:
      context: .
      dockerfile: .devcontainer/gpu/Dockerfile
    container_name: maldev-gpu
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: sleep infinity
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      GRPC_HOST: host.docker.internal
      GRPC_PORT: 10081
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "12082:12080"