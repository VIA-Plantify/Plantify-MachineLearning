name: Build and push serverless image

on:
  push:
    branches: [azure-functions]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/via-plantify/plantify-machinelearning/mlapi:latest
            ghcr.io/via-plantify/plantify-machinelearning/mlapi:${{ github.sha }}
