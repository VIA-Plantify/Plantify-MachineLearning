name: Build and Push to Azure

on:
  push:
  workflow_dispatch:
    inputs:
      image_name:
        description: 'Image name (e.g. mlapi)'
        required: true
        default: 'mlapi'

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/via-plantify/plantify-machinelearning/${{ inputs.image_name }}:latest
            ghcr.io/via-plantify/plantify-machinelearning/${{ inputs.image_name }}:${{ steps.vars.outputs.sha_short }}

      - name: Deploy to Azure Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: plantify-ml
          resourceGroup: Plantify
          imageToDeploy: ghcr.io/via-plantify/plantify-machinelearning/${{ inputs.image_name }}:${{ steps.vars.outputs.sha_short }}
          registryUrl: ghcr.io
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GITHUB_TOKEN }}
