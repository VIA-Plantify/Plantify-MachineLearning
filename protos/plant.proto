syntax = "proto3";

package plant;
import "google/protobuf/empty.proto";
import "sensors.proto";
import "watering.proto";
// enums
enum TemperatureScale {
  C = 0;
  F = 1;
}

// Requests
message CreatePlantRequest {
  string username = 1;
  string name = 2;
  string MAC = 3;

  double optimalTemperature = 4;
  double optimalAirHumidity = 5;
  double optimalSoilHumidity = 6;
  double optimalLightIntensity = 7;
  int64 optimalLightPeriodSeconds = 8;

  TemperatureScale temperatureScale = 9;
}

message GetPlantsByUsernameRequest {
  string username = 1;
  int32 numberOfReadings = 2;
}

message GetPlantRequest {
  string username = 1;
  string plantMAC = 2;
  int32 numberOfSensorReadings = 3;
  int32 numberOfWateringReadings = 4;
}

message DeletePlantRequest {
  string username = 1;
  string plantMAC = 2;
}

message UpdatePlantRequest {
  string username = 1;
  string plantMAC = 2;
  string name = 3;

  double optimalTemperature = 4;
  double optimalAirHumidity = 5;
  double optimalSoilHumidity = 6;
  double optimalLightIntensity = 7;
  int64 optimalLightPeriodSeconds = 8;

  TemperatureScale temperatureScale = 9;
}

// Responses
message PlantResponse {
  string plantMAC = 1;
  string name = 2;
  string username = 3;

  // Configuration
  double optimalTemperature = 4;
  double optimalAirHumidity = 5;
  double optimalSoilHumidity = 6;
  double optimalLightIntensity = 7;
  int64 optimalLightPeriodSeconds = 8;

  TemperatureScale temperatureScale = 9;

  // Sensor state
  sensors.SensorResponse sensorData = 10;
  sensors.PreviousSensorResponses previousSensorReadings = 11;
  // Watering
  watering.WateringResponse watering = 12;
  watering.PreviousWateringResponses previousWateringReadings = 13;
}

message GetManyPlantResponse {
  repeated PlantResponse plants = 1;
}

// Service
service PlantServiceProto {
  rpc Create(CreatePlantRequest) returns (PlantResponse);
  rpc GetPlantsByUsername(GetPlantsByUsernameRequest) returns (GetManyPlantResponse);
  rpc GetAllPlants(google.protobuf.Empty) returns (GetManyPlantResponse);
  rpc Get(GetPlantRequest) returns (PlantResponse);
  rpc Update(UpdatePlantRequest) returns (google.protobuf.Empty);
  rpc Delete(DeletePlantRequest) returns (google.protobuf.Empty);
}