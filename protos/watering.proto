syntax = "proto3";

package watering;
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

message WateringResponse{
  string plantMAC = 1;
  int32 Id = 2;
  google.protobuf.Timestamp LastWaterTime = 3;
  google.protobuf.Timestamp PredictedFutureWaterTime = 4;
  int32 PumpTimeInSeconds = 5;
  double WaterLevel = 6;
}
message PreviousWateringResponses{
  string plantMAC = 1;
  repeated google.protobuf.Timestamp LastWaterTime = 3;
  repeated google.protobuf.Timestamp PredictedFutureWaterTime = 4;
  repeated int32 PumpTimeInSeconds = 5;
  repeated double WaterLevel = 6;
}